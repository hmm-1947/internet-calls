<!DOCTYPE html>
<html>

<head>
    <title>Call Server Admin</title>

    <style>
        body {
            font-family: Arial;
            background: #111;
            color: white;
            padding: 20px;
        }

        .card {
            background: #222;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 10px;
        }

        h2 {
            margin-top: 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        td,
        th {
            padding: 10px;
            border-bottom: 1px solid #444;
        }

        .online {
            color: #00ff66;
        }

        .calling {
            color: #ffcc00;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: #1b1b1b;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .stat-card h3 {
            margin: 0;
            font-size: 32px;
            color: #00ff99;
        }

        .stat-card span {
            color: #999;
        }

        .card {
            box-shadow: 0 0 15px rgba(0, 0, 0, .3);
        }

        table tr:hover {
            background: #2a2a2a;
        }

        .online-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }

        .online-now {
            background: #00ff66;
        }

        .offline-now {
            background: #666;
        }
    </style>
</head>

<body>
    <div class="stats">
        <div class="stat-card">
            <h3 id="listenerCount">0</h3>
            <span>Listeners</span>
        </div>

        <div class="stat-card">
            <h3 id="userCount">0</h3>
            <span>Users</span>
        </div>

        <div class="stat-card">
            <h3 id="onlineCount">0</h3>
            <span>Online</span>
        </div>

        <div class="stat-card">
            <h3 id="callCount">0</h3>
            <span>Active Calls</span>
        </div>
    </div>
    <div class="card">
        <h2>Listeners</h2>
        <table id="listenersTable"></table>
    </div>

    <div class="card">
        <h2>Users</h2>
        <table id="usersTable"></table>
    </div>

    <div class="card">
        <h2>Online Users</h2>
        <ul id="onlineUsers"></ul>
    </div>

    <div class="card">
        <h2>Calls In Progress</h2>
        <ul id="calls"></ul>
    </div>

    <script>
        let selectedUser = null;

        async function loadDashboard() {
            const res = await fetch("/admin/stats");
            const data = await res.json();

            const listenersTable = document.getElementById("listenersTable");
            listenersTable.innerHTML = "<tr><th>Status</th><th>Listener</th><th>Total Talk Time</th><th>Created</th></tr>";
            data.listeners.forEach(user => {
                const mins = Math.ceil((user.total_duration || 0) / 60);
                listenersTable.innerHTML += `<tr>
        <td><span class="online-dot ${user.online ? "online-now" : "offline-now"}"></span></td>
        <td>${user.username}</td>
        <td>${mins} min</td>
        <td>${user.created_at}</td>
    </tr>`;
            });

            const usersTable = document.getElementById("usersTable");
            usersTable.innerHTML = "<tr><th>Status</th><th>User</th><th>Coins</th><th>Total Talk Time</th><th>Created</th><th>Chats</th></tr>";
            data.users.forEach(user => {
                const mins = Math.ceil((user.total_duration || 0) / 60);
                usersTable.innerHTML += `
    <tr>
        <td><span class="online-dot ${user.online ? "online-now" : "offline-now"}"></span></td>
        <td>${user.username}</td>
        <td><input type="number" value="${user.coins}" style="width:70px;background:#333;color:white;border:1px solid #555;border-radius:4px;padding:2px 6px" onchange="updateCoins('${user.username}', this.value)"></td>
        <td>${mins} min</td>
        <td>${user.created_at}</td>
        <td><button onclick="openChats('${user.username}')" style="background:#333;color:#00ff99;border:1px solid #555;border-radius:4px;padding:3px 10px;cursor:pointer">Chats</button></td>
    </tr>`;
            });

            document.getElementById("onlineUsers").innerHTML = data.online_users.map(u => `<li class="online">${u}</li>`).join("");
            document.getElementById("calls").innerHTML = data.active_calls.map(c => `<li class="calling">${c.caller} ➜ ${c.target}</li>`).join("");
            document.getElementById("listenerCount").innerText = data.listeners.length;
            document.getElementById("userCount").innerText = data.users.length;
            document.getElementById("onlineCount").innerText = data.online_users.length;
            document.getElementById("callCount").innerText = data.active_calls.length;
        }

        async function openChats(username) {
            selectedUser = username;
            document.getElementById("chatPanel").style.display = "flex";
            document.getElementById("chatTitle").innerText = username + " — Conversations";
            document.getElementById("chatThread").style.display = "none";
            document.getElementById("chatList").style.display = "block";

            const [chatsRes, recRes] = await Promise.all([
                fetch(`/admin/chats/${username}`),
                fetch(`/admin/recordings/all/${username}`)
            ]);
            const chats = await chatsRes.json();
            const recordings = await recRes.json();

            const el = document.getElementById("chatList");
            let html = "";

            if (recordings.length > 0) {
                html += `<div style="margin-bottom:15px"><div style="color:#ffcc00;font-weight:bold;margin-bottom:8px">📞 Call Recordings</div>`;
                html += recordings.map(r => `
    <div style="padding:10px;border-bottom:1px solid #333">
        <div style="font-size:12px;color:#aaa;margin-bottom:5px">${r.caller} → ${r.listener} · ${new Date(r.created_at).toLocaleString()}</div>
        <audio controls style="height:32px;width:100%"><source src="/recordings/file/${r.filename}" type="audio/aac"></audio>
    </div>`).join("");
                html += `</div>`;
            }

            if (chats.length === 0 && recordings.length === 0) {
                el.innerHTML = "<p style='color:#999'>No chats or recordings found.</p>";
                return;
            }

            if (chats.length > 0) {
                html += `<div style="color:#00ff99;font-weight:bold;margin-bottom:8px">💬 Conversations</div>`;
                html += chats.map(c => `
            <div onclick="openThread('${username}','${c.other_user}')" style="padding:12px;border-bottom:1px solid #333;cursor:pointer;border-radius:6px" onmouseover="this.style.background='#2a2a2a'" onmouseout="this.style.background='transparent'">
                <div style="font-weight:bold;color:#fff">${c.other_user}</div>
                <div style="color:#999;font-size:13px;margin-top:3px">${c.last_message}</div>
                <div style="color:#555;font-size:11px;margin-top:2px">${new Date(c.last_at).toLocaleString()}</div>
            </div>`).join("");
            }

            el.innerHTML = html;
        }
        async function openThread(user1, user2) {
            document.getElementById("chatList").style.display = "none";
            document.getElementById("chatThread").style.display = "block";
            document.getElementById("chatTitle").innerText = `${user1} ↔ ${user2}`;

            const res = await fetch(`/admin/messages/${user1}/${user2}`);
            const msgs = await res.json();
            const el = document.getElementById("chatThread");
            el.innerHTML = `<div style="margin-bottom:10px"><button onclick="backToChats()" style="background:#333;color:#ccc;border:1px solid #555;border-radius:4px;padding:4px 12px;cursor:pointer">← Back</button></div>`;

            const today = new Date(); today.setHours(0, 0, 0, 0);
            const yesterday = new Date(today); yesterday.setDate(today.getDate() - 1);

            function dateLabel(dateStr) {
                const d = new Date(dateStr); d.setHours(0, 0, 0, 0);
                if (d.getTime() === today.getTime()) return "Today";
                if (d.getTime() === yesterday.getTime()) return "Yesterday";
                return d.toLocaleDateString(undefined, { day: "numeric", month: "long", year: "numeric" });
            }

            function timeStr(dateStr) {
                return new Date(dateStr).toLocaleTimeString(undefined, { hour: "2-digit", minute: "2-digit" });
            }

            let lastLabel = null;
            msgs.forEach(m => {
                const label = dateLabel(m.created_at);
                if (label !== lastLabel) {
                    lastLabel = label;
                    el.innerHTML += `<div style="text-align:center;margin:16px 0 10px"><span style="background:#2a2a2a;color:#999;font-size:12px;padding:4px 14px;border-radius:20px;border:1px solid #444">${label}</span></div>`;
                }
                el.innerHTML += `
            <div style="margin-bottom:8px;text-align:${m.sender === user1 ? 'right' : 'left'}">
                <div style="display:inline-block;background:${m.sender === user1 ? '#1a3a2a' : '#2a2a2a'};padding:8px 12px;border-radius:10px;max-width:70%">
                    <div style="font-size:11px;color:#888;margin-bottom:3px">${m.sender}</div>
                    <div>${m.message_type === 'voice'
                        ? `<audio controls style="height:32px;width:220px"><source src="/voice_messages/${m.content}" type="audio/aac"></audio>`
                        : m.content
                    }</div>
                    <div style="font-size:10px;color:#555;margin-top:3px;text-align:right">${timeStr(m.created_at)}</div>
                </div>
            </div>`;
            });
        }


        function backToChats() {
            document.getElementById("chatThread").style.display = "none";
            document.getElementById("chatList").style.display = "block";
            document.getElementById("chatTitle").innerText = selectedUser + " — Conversations";
        }

        function closePanel() {
            document.getElementById("chatPanel").style.display = "none";
        }
        async function registerListener() {
            const username = document.getElementById("newListenerUsername").value.trim();
            const password = document.getElementById("newListenerPassword").value.trim();
            const msg = document.getElementById("listenerRegMsg");
            if (!username || !password) { msg.style.color = "#ff4444"; msg.innerText = "Both fields required"; return; }
            const res = await fetch("/register", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username, password, role: "listener" })
            });
            if (res.ok) {
                msg.style.color = "#00ff99"; msg.innerText = "Registered!";
                document.getElementById("newListenerUsername").value = "";
                document.getElementById("newListenerPassword").value = "";
                loadDashboard();
            } else {
                const err = await res.json();
                msg.style.color = "#ff4444"; msg.innerText = err.detail || "Failed";
            }
        }
        async function updateCoins(username, coins) {
            await fetch("/admin/set_coins", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username, coins: parseInt(coins) })
            });
        }

        loadDashboard();
        setInterval(loadDashboard, 2000);
    </script>

    <div id="chatPanel"
        style="display:none;position:fixed;top:0;right:0;width:420px;height:100vh;background:#1a1a1a;border-left:1px solid #333;z-index:999;display:none;flex-direction:column">
        <div
            style="padding:15px;border-bottom:1px solid #333;display:flex;justify-content:space-between;align-items:center">
            <span id="chatTitle" style="font-weight:bold;font-size:16px"></span>
            <button onclick="closePanel()"
                style="background:none;border:none;color:#fff;font-size:20px;cursor:pointer">✕</button>
        </div>
        <div style="flex:1;overflow-y:auto;padding:15px">
            <div id="chatList"></div>
            <div id="chatThread" style="display:none"></div>
        </div>
    </div>
    <div class="card">
        <h2>Register Listener</h2>
        <div style="display:flex;gap:10px;align-items:center">
            <input id="newListenerUsername" placeholder="Username"
                style="background:#1a1a1a;color:white;border:1px solid #444;border-radius:6px;padding:8px 12px;font-size:14px">
            <input id="newListenerPassword" placeholder="Password" type="password"
                style="background:#1a1a1a;color:white;border:1px solid #444;border-radius:6px;padding:8px 12px;font-size:14px">
            <button onclick="registerListener()"
                style="background:#00ff99;color:#000;border:none;border-radius:6px;padding:8px 18px;font-weight:bold;cursor:pointer">Register</button>
            <span id="listenerRegMsg" style="font-size:13px"></span>
        </div>
    </div>
</body>

</html>
