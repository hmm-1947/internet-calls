<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #f0f2f5;
      font-family: 'Segoe UI', sans-serif;
    }

    nav {
      background: white;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    nav h1 { font-size: 18px; color: #111; }

    nav button {
      padding: 8px 16px;
      background: none;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      color: #555;
      transition: background 0.2s;
    }

    nav button:hover { background: #f5f5f5; }

    .container { max-width: 860px; margin: 36px auto; padding: 0 16px; }

    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      padding: 28px;
      margin-bottom: 24px;
    }

    .card h2 { font-size: 16px; color: #111; margin-bottom: 20px; }

    .form-row {
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }

    .field { flex: 1; }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #555;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    input {
      width: 100%;
      padding: 9px 13px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border 0.2s;
    }

    input:focus { border-color: #4f46e5; }

    .btn-primary {
      padding: 10px 20px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }

    .btn-primary:hover { background: #4338ca; }
    .btn-primary:disabled { background: #a5b4fc; cursor: not-allowed; }

    .feedback {
      margin-top: 12px;
      font-size: 13px;
      display: none;
    }

    .feedback.success { color: #16a34a; }
    .feedback.error { color: #dc2626; }

    table { width: 100%; border-collapse: collapse; }

    thead tr { border-bottom: 2px solid #f0f0f0; }

    th {
      text-align: left;
      font-size: 12px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      padding: 0 0 12px;
    }

    td {
      padding: 14px 0;
      font-size: 14px;
      color: #333;
      border-bottom: 1px solid #f5f5f5;
    }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 99px;
      font-size: 12px;
      font-weight: 600;
    }

    .badge.online { background: #dcfce7; color: #16a34a; }
    .badge.offline { background: #f3f4f6; color: #9ca3af; }

    .btn-delete {
      padding: 6px 14px;
      background: none;
      border: 1px solid #fecaca;
      border-radius: 8px;
      color: #dc2626;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-delete:hover { background: #fef2f2; }

    .empty {
      text-align: center;
      padding: 40px 0;
      color: #aaa;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <nav>
    <h1>Admin Dashboard</h1>
    <button onclick="logout()">Logout</button>
  </nav>
  <div class="container">
    <div class="card">
      <h2>Create Listener Account</h2>
      <div class="form-row">
        <div class="field">
          <label for="newUsername">Username</label>
          <input type="text" id="newUsername" placeholder="Enter username" />
        </div>
        <div class="field">
          <label for="newPassword">Password</label>
          <input type="password" id="newPassword" placeholder="Enter password" />
        </div>
        <button class="btn-primary" id="createBtn" onclick="createListener()">Create</button>
      </div>
      <div class="feedback" id="createFeedback"></div>
    </div>
    <div class="card">
      <h2>Listeners</h2>
      <table>
        <thead>
          <tr>
            <th>Username</th>
            <th>Status</th>
            <th>Created</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="listenerTable">
          <tr><td colspan="4" class="empty">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
  <script src="admin.js"></script>
</body>
</html>
